resources:
  - name: repo
    type: git
    source:
      uri: https://github.com/kishan-sky-dne/Watchman_FC_Conn_Check.git
      username: ((common-creds.github_username))
      password: ((common-creds.github_personal_access_token))
      branch: main
jobs:
  - name: get-pods-rpki
    public: true
    plan:
      - get: repo
        trigger: true
      - task: get-pods-rpki
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: bitnami/kubectl
          inputs:
            - name: repo
          run:
            path: /bin/sh
            args:
              - -exc
              - |
                # Ensure `kubelogin` is available (prefer Homebrew install)
                if ! command -v kubelogin >/dev/null 2>&1; then
                  if command -v brew >/dev/null 2>&1; then
                    brew install Azure/kubelogin/kubelogin || true
                  else
                    echo "Homebrew not found; attempting non-interactive Homebrew install..."
                    NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || echo "Homebrew install failed"
                    eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)" 2>/dev/null || true
                    brew install Azure/kubelogin/kubelogin || echo "kubelogin install via brew failed"
                  fi
                fi

                # For every kubeconfig in repo/kubecon, run kubectl get pods
                KUBECONF_DIR="repo/kubecon"
                NAMESPACE="dne-develop"

                if [ ! -d "$KUBECONF_DIR" ]; then
                  echo "kubecon directory not found at $KUBECONF_DIR" >&2
                  exit 1
                fi

                found=false
                for kc in "$KUBECONF_DIR"/*; do
                  if [ -f "$kc" ]; then
                    found=true
                    echo "----- Pods using kubeconfig: $kc (namespace: $NAMESPACE) -----"
                    kubectl --kubeconfig="$kc" get pods -n "$NAMESPACE" -o wide || echo "kubectl failed for $kc"
                    echo
                  fi
                done

                if [ "$found" != true ]; then
                  echo "No kubeconfig files found in $KUBECONF_DIR" >&2
                  exit 1
                fi